<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="appleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="appleOrbitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.5"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="#0f172a"/>
  
  <!-- Logo centered -->
  <g transform="translate(40, 40)">
    <!-- Orbital rings -->
    <ellipse cx="50" cy="50" rx="42" ry="16" fill="none" stroke="url(#appleOrbitGrad)" stroke-width="2" transform="rotate(-35, 50, 50)"/>
    <ellipse cx="50" cy="50" rx="42" ry="16" fill="none" stroke="url(#appleOrbitGrad)" stroke-width="2" transform="rotate(35, 50, 50)"/>
    <ellipse cx="50" cy="50" rx="42" ry="16" fill="none" stroke="url(#appleOrbitGrad)" stroke-width="2" transform="rotate(90, 50, 50)"/>
    
    <!-- Central qubit -->
    <circle cx="50" cy="50" r="18" fill="url(#appleGradient)"/>
    <circle cx="50" cy="50" r="13" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
    <text x="50" y="57" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Q</text>
    
    <!-- Electrons -->
    <circle cx="92" cy="50" r="4" fill="#06b6d4"/>
    <circle cx="50" cy="8" r="3.5" fill="#8b5cf6"/>
    <circle cx="22" cy="80" r="3.5" fill="#ec4899"/>
  </g>
</svg>
