<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="logo-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="logo-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="logo-orbit" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="logo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="logo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#8b5cf6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Icon -->
  <g transform="translate(10, 10)">
    <!-- Background glow -->
    <circle cx="40" cy="40" r="38" fill="url(#logo-glow)"/>

    <!-- Outer ring -->
    <circle cx="40" cy="40" r="35" fill="none" stroke="url(#logo-core)" stroke-width="1" stroke-opacity="0.2"/>

    <!-- Orbital rings -->
    <ellipse cx="40" cy="40" rx="32" ry="11" fill="none" stroke="url(#logo-orbit)" stroke-width="1.2" transform="rotate(-30, 40, 40)"/>
    <ellipse cx="40" cy="40" rx="32" ry="11" fill="none" stroke="url(#logo-orbit)" stroke-width="1.2" transform="rotate(30, 40, 40)"/>
    <ellipse cx="40" cy="40" rx="32" ry="11" fill="none" stroke="url(#logo-orbit)" stroke-width="1.2" transform="rotate(90, 40, 40)"/>

    <!-- Central qubit -->
    <circle cx="40" cy="40" r="15" fill="url(#logo-core)" filter="url(#logo-shadow)"/>
    <circle cx="40" cy="40" r="11" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>

    <!-- Quantum state symbol -->
    <g transform="translate(40, 40)">
      <line x1="0" y1="-7" x2="0" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-4" y1="-5" x2="0" y2="-7" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="4" y1="-5" x2="0" y2="-7" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="-5" y1="7" x2="5" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    </g>

    <!-- Electron particles -->
    <circle cx="72" cy="40" r="3.5" fill="#06b6d4"/>
    <circle cx="40" cy="8" r="3" fill="#8b5cf6"/>
    <circle cx="18" cy="62" r="3" fill="#ec4899"/>
  </g>

  <!-- Wordmark -->
  <text x="105" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="url(#logo-text)">Quantum</text>
  <text x="275" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white">Shala</text>
</svg>
