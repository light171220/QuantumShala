<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="orbitLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="500" r="200" fill="rgba(6, 182, 212, 0.08)"/>
  <circle cx="1050" cy="130" r="180" fill="rgba(139, 92, 246, 0.08)"/>
  
  <!-- Logo icon -->
  <g transform="translate(350, 165)">
    <!-- Orbital rings -->
    <ellipse cx="100" cy="100" rx="90" ry="35" fill="none" stroke="url(#orbitLine)" stroke-width="3" transform="rotate(-35, 100, 100)" filter="url(#glow)"/>
    <ellipse cx="100" cy="100" rx="90" ry="35" fill="none" stroke="url(#orbitLine)" stroke-width="3" transform="rotate(35, 100, 100)" filter="url(#glow)"/>
    <ellipse cx="100" cy="100" rx="90" ry="35" fill="none" stroke="url(#orbitLine)" stroke-width="3" transform="rotate(90, 100, 100)" filter="url(#glow)"/>
    
    <!-- Central qubit -->
    <circle cx="100" cy="100" r="40" fill="url(#mainGradient)" filter="url(#glow)"/>
    <circle cx="100" cy="100" r="30" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
    <text x="100" y="115" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Q</text>
    
    <!-- Electrons -->
    <circle cx="190" cy="100" r="10" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="100" cy="10" r="8" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="40" cy="165" r="8" fill="#ec4899" filter="url(#glow)"/>
  </g>
  
  <!-- Text -->
  <text x="550" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="url(#textGradient)">Quantum</text>
  <text x="550" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white">Shala</text>
  
  <!-- Tagline -->
  <text x="550" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">Master Quantum Computing</text>
  
  <!-- Feature badges -->
  <g transform="translate(550, 545)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="rgba(6, 182, 212, 0.2)"/>
    <text x="70" y="24" font-family="system-ui, sans-serif" font-size="14" fill="#06b6d4" text-anchor="middle">9 Learning Paths</text>
    
    <rect x="155" y="0" width="160" height="36" rx="18" fill="rgba(139, 92, 246, 0.2)"/>
    <text x="235" y="24" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6" text-anchor="middle">Interactive Simulator</text>
    
    <rect x="330" y="0" width="100" height="36" rx="18" fill="rgba(236, 72, 153, 0.2)"/>
    <text x="380" y="24" font-family="system-ui, sans-serif" font-size="14" fill="#ec4899" text-anchor="middle">Free</text>
  </g>
</svg>
