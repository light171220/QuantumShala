<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="icon-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="icon-orbit1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="icon-orbit2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="icon-orbit3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#ec4899" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="icon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="icon-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#8b5cf6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="50" cy="50" r="45" fill="url(#icon-glow)"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#icon-core)" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Orbital paths -->
  <ellipse cx="50" cy="50" rx="38" ry="14" fill="none" stroke="url(#icon-orbit1)" stroke-width="1.5" transform="rotate(-30, 50, 50)"/>
  <ellipse cx="50" cy="50" rx="38" ry="14" fill="none" stroke="url(#icon-orbit2)" stroke-width="1.5" transform="rotate(30, 50, 50)"/>
  <ellipse cx="50" cy="50" rx="38" ry="14" fill="none" stroke="url(#icon-orbit3)" stroke-width="1.5" transform="rotate(90, 50, 50)"/>

  <!-- Central qubit sphere -->
  <circle cx="50" cy="50" r="18" fill="url(#icon-core)" filter="url(#icon-shadow)"/>
  <circle cx="50" cy="50" r="14" fill="none" stroke="white" stroke-width="1" opacity="0.25"/>

  <!-- Quantum state symbol -->
  <g transform="translate(50, 50)">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="-6" x2="0" y2="-8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="-6" x2="0" y2="-8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="8" x2="6" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Electron particles -->
  <circle cx="88" cy="50" r="4" fill="#06b6d4"/>
  <circle cx="50" cy="12" r="3.5" fill="#8b5cf6"/>
  <circle cx="22" cy="75" r="3" fill="#ec4899"/>
</svg>
