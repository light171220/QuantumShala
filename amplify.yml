version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
    postBuild:
      commands:
        - echo "Generating content index..."
        - node scripts/generate-index.cjs
        - echo "Syncing learning content to S3..."
        - BUCKET_NAME=$(cat amplify_outputs.json | grep -o '"bucket_name"[:] "[^"]*' | head -1 | cut -d'"' -f4)
        - echo "Bucket found - $BUCKET_NAME"
        - aws s3 sync ./learning_content s3://$BUCKET_NAME/content/lessons/ --delete --exclude "*.DS_Store" --exclude ".claude/*" --cache-control "public, max-age=3600"
        - echo "Content sync complete!"
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
